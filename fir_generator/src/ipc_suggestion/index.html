<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IPC Suggester | AI-Powered Legal Assistance</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --secondary: #a855f7;
            --accent: #f43f5e;
            --bg: #0f172a;
            --glass: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Outfit', sans-serif;
            background: var(--bg);
            color: #f8fafc;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
        }

        .animated-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            background: radial-gradient(circle at 20% 30%, rgba(99, 102, 241, 0.15) 0%, transparent 50%),
                        radial-gradient(circle at 80% 70%, rgba(168, 85, 247, 0.15) 0%, transparent 50%);
            animation: moveBg 20s infinite alternate ease-in-out;
        }

        @keyframes moveBg {
            0% { transform: scale(1); }
            100% { transform: scale(1.1); }
        }

        header {
            margin-top: 50px;
            text-align: center;
            animation: fadeInDown 0.8s ease-out;
        }

        h1 {
            font-size: 3rem;
            font-weight: 800;
            background: linear-gradient(135deg, #fff 0%, #cbd5e1 100%);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
        }

        p.subtitle {
            color: #94a3b8;
            font-size: 1.1rem;
        }

        .container {
            width: 90%;
            max-width: 900px;
            margin: 40px auto;
            position: relative;
        }

        .card {
            background: var(--glass);
            backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 40px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            animation: fadeInUp 0.8s ease-out;
        }

        .input-group {
            margin-bottom: 25px;
        }

        label {
            display: block;
            margin-bottom: 10px;
            font-weight: 600;
            color: #e2e8f0;
        }

        textarea {
            width: 100%;
            max-width: -webkit-fill-available;
            padding: 15px;
            border-radius: 12px;
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid var(--glass-border);
            color: white;
            font-family: inherit;
            font-size: 1rem;
            resize: vertical;
            min-height: 120px;
            transition: border-color 0.3s, box-shadow 0.3s;
        }

        textarea:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 2px rgba(99, 102, 241, 0.2);
        }

        .severity-select {
            display: flex;
            gap: 15px;
            margin-top: 10px;
        }

        .severity-option {
            flex: 1;
            padding: 12px;
            text-align: center;
            border-radius: 12px;
            border: 1px solid var(--glass-border);
            cursor: pointer;
            transition: all 0.3s;
            font-weight: 600;
            background: rgba(255, 255, 255, 0.02);
        }

        .severity-option.active[data-val="low"] { background: rgba(34, 197, 94, 0.2); border-color: #22c55e; color: #4ade80; }
        .severity-option.active[data-val="medium"] { background: rgba(234, 179, 8, 0.2); border-color: #eab308; color: #facc15; }
        .severity-option.active[data-val="high"] { background: rgba(239, 68, 68, 0.2); border-color: #ef4444; color: #f87171; }

        .severity-option:hover:not(.active) {
            background: rgba(255, 255, 255, 0.05);
            transform: translateY(-2px);
        }

        button.btn-primary {
            width: 100%;
            padding: 15px;
            border-radius: 12px;
            border: none;
            background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
            color: white;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 20px;
            box-shadow: 0 10px 15px -3px rgba(99, 102, 241, 0.3);
        }

        button.btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 20px 25px -5px rgba(99, 102, 241, 0.4);
        }

        button.btn-primary:active {
            transform: translateY(0);
        }

        .loader {
            display: none;
            margin: 20px auto;
            border: 3px solid rgba(255, 255, 255, 0.1);
            border-top: 3px solid var(--primary);
            border-radius: 50%;
            width: 30px;
            height: 30px;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        #results {
            margin-top: 40px;
            display: none;
            grid-gap: 20px;
            animation: fadeIn 0.5s ease-out;
        }

        .result-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            padding: 24px;
            transition: all 0.3s;
        }

        .result-card:hover {
            background: rgba(255, 255, 255, 0.05);
            transform: translateX(5px);
            border-color: rgba(255, 255, 255, 0.2);
        }

        .result-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }

        .section-badge {
            background: var(--primary);
            padding: 4px 12px;
            border-radius: 99px;
            font-size: 0.8rem;
            font-weight: 700;
        }

        .result-title {
            font-size: 1.2rem;
            font-weight: 600;
            color: #f1f5f9;
        }

        .result-desc {
            color: #94a3b8;
            font-size: 0.95rem;
            line-height: 1.6;
            margin-bottom: 15px;
            font-style: italic;
        }

        .reasoning-box {
            background: rgba(99, 102, 241, 0.1);
            border-left: 4px solid var(--primary);
            padding: 12px 16px;
            border-radius: 0 8px 8px 0;
            font-size: 0.9rem;
            color: #c7d2fe;
        }

        .reasoning-label {
            display: block;
            font-weight: 700;
            text-transform: uppercase;
            font-size: 0.7rem;
            margin-bottom: 5px;
            color: var(--primary);
        }

        .procedural-badges {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }

        .proc-badge {
            font-size: 0.75rem;
            font-weight: 700;
            padding: 4px 10px;
            border-radius: 6px;
            text-transform: uppercase;
        }

        .badge-primary { background: rgba(99, 102, 241, 0.2); color: #818cf8; border: 1px solid rgba(99, 102, 241, 0.3); }
        .badge-warn { background: rgba(234, 179, 8, 0.2); color: #facc15; border: 1px solid rgba(234, 179, 8, 0.3); }
        .badge-danger { background: rgba(239, 68, 68, 0.2); color: #f87171; border: 1px solid rgba(239, 68, 68, 0.3); }
        .badge-success { background: rgba(34, 197, 94, 0.2); color: #4ade80; border: 1px solid rgba(34, 197, 94, 0.3); }

        .punishment-box {
            background: rgba(255, 255, 255, 0.02);
            border: 1px dashed var(--glass-border);
            padding: 12px;
            border-radius: 8px;
            font-size: 0.9rem;
            margin-bottom: 12px;
            color: #cbd5e1;
        }

        .proc-label {
            display: block;
            font-weight: 700;
            text-transform: uppercase;
            font-size: 0.65rem;
            margin-bottom: 3px;
            color: #94a3b8;
        }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes fadeInDown { from { opacity: 0; transform: translateY(-20px); } to { opacity: 1; transform: translateY(0); } }

        footer {
            margin: 40px 0;
            color: #475569;
            font-size: 0.8rem;
        }
    </style>
</head>
<body>
    <div class="animated-bg"></div>
    
    <header>
        <h1>JusticeRoute</h1>
        <p class="subtitle">IPC applications | Law Enforcement Intelligence</p>
    </header>

    <div class="container">
        <div class="card">
            <div class="input-group">
                <label for="incident">Incident Description</label>
                <textarea id="incident" placeholder="Describe the incident details for legal classification..."></textarea>
            </div>

            <button class="btn-primary" onclick="getSuggestions()">Analyze & Suggest Sections</button>
            <div class="loader" id="loader"></div>
        </div>

        <div id="results">
            <!-- Results will be injected here -->
        </div>
    </div>

    <footer>
        &copy; 2026 JusticeRoute | Procedural IPC Mapping for Police Units.
    </footer>

    <script>
        async function getSuggestions() {
            const incident = document.getElementById('incident').value;
            const resultsDiv = document.getElementById('results');
            const loader = document.getElementById('loader');

            if (!incident.trim()) {
                alert("Please enter an incident description.");
                return;
            }

            // UI State
            resultsDiv.style.display = 'none';
            resultsDiv.innerHTML = '';
            loader.style.display = 'block';

            try {
                const response = await fetch('/suggest-ipc', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        incident_text: incident
                    })
                });

                const data = await response.json();
                loader.style.display = 'none';

                if (response.ok) {
                    resultsDiv.style.display = 'grid';
                    data.forEach((item, index) => {
                        const card = document.createElement('div');
                        card.className = 'result-card';
                        card.style.animationDelay = `${index * 0.1}s`;
                        
                        const natureClass = item.nature.includes('Non') ? 'badge-warn' : 'badge-primary';
                        const bailableClass = item.bailable.includes('Non') ? 'badge-danger' : 'badge-success';

                        card.innerHTML = `
                            <div class="result-header">
                                <span class="result-title">${item.title}</span>
                                <span class="section-badge">${item.section}</span>
                            </div>
                            <div class="procedural-badges">
                                <span class="proc-badge ${natureClass}">${item.nature}</span>
                                <span class="proc-badge ${bailableClass}">${item.bailable}</span>
                            </div>
                            <div class="result-desc">"${item.description}"</div>
                            <div class="punishment-box">
                                <span class="proc-label">Potential Punishment</span>
                                ${item.punishment}
                            </div>
                            <div class="reasoning-box">
                                <span class="reasoning-label">Legal Reasoning & Procedure</span>
                                ${item.reason_for_application}
                            </div>
                        `;
                        resultsDiv.appendChild(card);
                    });
                } else {
                    alert("Error: " + (data.detail || "Failed to fetch suggestions"));
                }
            } catch (err) {
                loader.style.display = 'none';
                alert("Connection Error: " + err.message);
            }
        }
    </script>
</body>
</html>
